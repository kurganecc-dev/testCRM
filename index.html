    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 13px; scroll-behavior: smooth; }
        .status-idea { border-left: 5px solid #9ca3af; }

        .status-ready { border-left: 5px solid #10b981; }
        .status-published { border-left: 6px solid #6366f1; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background-color: #e2e8f0; gap: 1px; border: 1px solid #e2e8f0; }
        .calendar-day { min-height: 110px; background-color: white; padding: 4px; overflow-y: auto; }
        .calendar-item { font-size: 8px; margin-bottom: 2px; padding: 2px 4px; border-radius: 4px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; display: block; }
        .multi-select-box { max-height: 130px; overflow-y: auto; border: 1px solid #e2e8f0; padding: 8px; border-radius: 12px; background: #f8fafc; }
        .tab-active { background: #1e293b !important; color: white !important; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #loginOverlay { background: radial-gradient(circle at center, #1e293b 0%, #000 100%); z-index: 9999; position: fixed; inset: 0; }
        .admin-only { display: none; }
        #chatMessages::-webkit-scrollbar { width: 3px; }

                    <div class="flex bg-slate-100 p-1 rounded-xl font-black text-[9px] gap-1">

                            <option value="Instagram">Instagram</option><option value="VK">VK</option><option value="Telegram">Telegram (Все)</option>

        async function fetchSingleStat(url, platform) {
            if (!url || url.length < 10) return 0;
            const YT_KEY = localStorage.getItem('yt_key'), AP_TOKEN = localStorage.getItem('apify_token');
            try {
                if (platform === 'VK' && AP_TOKEN) {
                    const actor = "apify/vkontakte-scraper", input = { startUrls: [{ url: url }], maxItems: 1 };
                    const res = await fetch(`https://api.apify.com/v2/acts/${actor}/run-sync-get-dataset-items?token=${AP_TOKEN}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(input)});
                    const d = await res.json(); return d[0] ? (d[0].viewsCount || d[0].views?.count || 0) : 0;
                }
                if (TG_LIST.includes(platform) || url.includes('t.me/')) {
                    let sUrl = url.trim().replace('t.me/', 't.me/s/');
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(sUrl)}`);
                    const d = await res.json(), m = d.contents.match(/class="tgme_widget_message_views">([\d.KM]+)</i);
                    if (m) { let t = m[1].toUpperCase(); return t.includes('K') ? parseFloat(t)*1000 : (t.includes('M') ? parseFloat(t)*1000000 : parseInt(t.replace(/\D/g,'')) || 0); }
                }
                if (platform === 'YouTube' && YT_KEY) {
                    const vidId = (url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/)||[])[2];
                    if (vidId) { const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${vidId}&key=${YT_KEY}`); const d = await res.json(); return parseInt(d.items?.[0]?.statistics?.viewCount || 0); }
                }
                if ((platform === 'TikTok' || platform === 'Instagram') && AP_TOKEN) {
                    const actor = platform === 'TikTok' ? "GdWCkxBtKWOsKjdch" : "apify/instagram-post-scraper";
                    const input = platform === 'TikTok' ? { postURLs: [url] } : { directUrls: [url] };
                    const res = await fetch(`https://api.apify.com/v2/acts/${actor}/run-sync-get-dataset-items?token=${AP_TOKEN}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(input)});
                    const d = await res.json(); if (d[0]) return d[0].playCount || d[0].videoViewCount || d[0].videoPlayCount || d[0].likesCount || 0;
                }
            } catch (e) { return 0; } return 0;
        }

        }
        async function sendChatMessage() {
            const input = document.getElementById('chatInput'), msg = input.value.trim(); if (!msg) return;
            await _supabase.from('team_chat').insert([{ sender_name: sessionStorage.getItem('e_name'), sender_uid: sessionStorage.getItem('e_uid'), message: msg }]);
            input.value = '';
        }
        async function deleteMessage(id) { if (confirm("Удалить?")) await _supabase.from('team_chat').delete().eq('id', id); }

        checkAuth();
    </script>
</body>
</html>
